x-airflow-common:
  &airflow-common
  build:
    context: docker/airflow
  image: slettix-analytics/airflow:2.9.2
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: slettix-analytics-dev-key
    AIRFLOW__CORE__FERNET_KEY: ""
    # Spark connection — host must include spark:// prefix so SparkSubmitOperator
    # builds the correct --master spark://spark-master:7077 argument
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark://spark-master", "port": 7077}'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./jobs:/opt/airflow/spark_jobs
    - ./conf:/opt/airflow/spark_conf
    - ./spark/logs:/opt/spark/logs
  depends_on:
    postgres:
      condition: service_healthy
    spark-master:
      condition: service_healthy

services:

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Creates default buckets on first start
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/raw;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/checkpoints;
        mc mb --ignore-existing local/raw/stream-input;
        mc cp /dev/null local/raw/hr/employees/.domain;
        mc cp /dev/null local/bronze/hr/employees/.domain;
        mc cp /dev/null local/silver/hr/employees/.domain;
        mc cp /dev/null local/gold/hr/department_stats/.domain;
        mc cp /dev/null local/gold/data_products/.domain;
        echo 'Buckets and domain structure ready.';
      "

  # ── Spark ──────────────────────────────────────────────────────────────────
  spark-master:
    build:
      context: docker/spark
    image: slettix-analytics/spark:3.5.8
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Spark Web UI
      - "7077:7077"   # Spark master port
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./jobs:/opt/spark/jobs
      - ./conf:/opt/spark/app/conf
      - ./tests:/opt/spark/tests
      - ./data:/opt/spark/data
      - ./spark/logs:/opt/spark/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5

  spark-worker:
    image: slettix-analytics/spark:3.5.8
    container_name: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./jobs:/opt/spark/jobs

  # ── Jupyter Lab ────────────────────────────────────────────────────────────
  jupyter:
    build:
      context: docker/jupyter
    image: slettix-analytics/jupyter:3.5.8
    container_name: jupyter
    ports:
      - "8888:8888"   # Jupyter Lab
    volumes:
      - ./notebooks:/home/spark/notebooks
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
    depends_on:
      spark-master:
        condition: service_healthy

  # ── Airflow metadata database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Runs once: migrates DB and creates admin user
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@slettix.local"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"   # Airflow UI
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  minio_data:
  postgres_data:
