{% extends "base.html" %}
{% block title %}Registrer deg — Slettix Analytics{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-8 col-md-5 col-lg-4">
    <div class="card mt-4">
      <div class="card-body p-4">
        <h1 class="h4 mb-4 text-center"><i class="bi bi-person-plus me-2"></i>Registrer deg</h1>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register">
          <div class="mb-3">
            <label class="form-label" for="username">Brukernavn</label>
            <input id="username" name="username" type="text" class="form-control"
                   autocomplete="username" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">E-post</label>
            <input id="email" name="email" type="email" class="form-control"
                   autocomplete="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Passord <span class="text-muted small">(min. 6 tegn)</span></label>
            <input id="password" name="password" type="password" class="form-control"
                   autocomplete="new-password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-dark w-100">Opprett konto</button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-0">
          Har du allerede konto?
          <a href="/login">Logg inn</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
