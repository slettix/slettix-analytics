apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dataportal-sparkapps-reader
  namespace: slettix-analytics
rules:
  - apiGroups: ["sparkoperator.k8s.io"]
    resources: ["sparkapplications"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["airflow-dags"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["airflow-scheduler", "airflow-webserver", "dataportal"]
    verbs: ["get", "patch"]
  # Admin-UI kan oppdatere API-nøkler i slettix-credentials (kun denne).
  # ServiceAccount default får ikke `list` på secrets — bare `get`/`patch` på navngitt.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["slettix-credentials"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dataportal-sparkapps-reader
  namespace: slettix-analytics
subjects:
  - kind: ServiceAccount
    name: default
    namespace: slettix-analytics
roleRef:
  kind: Role
  name: dataportal-sparkapps-reader
  apiGroup: rbac.authorization.k8s.io
