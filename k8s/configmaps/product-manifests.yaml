        "max_null_rate": 0.01,
        "freshness_hours": 1
      },
      "tags": ["folkeregister", "pii", "streaming", "kafka", "idp", "bronze"],
      "contract": {
        "slo": {
          "freshness_hours": 1,
          "completeness_pct": 99
        },
        "schema_compatibility": "BACKWARD",
        "guaranteed_columns": [
          "event_id",
          "event_type",
          "event_timestamp",
          "person_id",
          "kafka_topic",
          "kafka_timestamp",
          "_processed_at"
        ]
