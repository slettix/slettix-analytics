          "nullable": true,
          "description": "Kjønn (M/F/X) — til stede ved PersonRegistrert og PersonFødt",
          "pii": false,
          "sensitivity": "low"
        },
        {
          "name": "mother_id",
          "type": "string",
          "nullable": true,
