        },
        {
          "name": "event_type",
          "type": "string",
          "nullable": false,
          "description": "Hendelsestype: PersonRegistrert | PersonFødt | PersonDød | PersonFlyttet",
          "pii": false
        },
        {
          "name": "event_timestamp",
          "type": "string",
          "nullable": true,
          "description": "Tidspunkt hendelsen inntraff (ISO 8601, fra kildesystemet)",
          "pii": false
        },
        {
          "name": "person_id",
