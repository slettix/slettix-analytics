# Helm values for Apache Airflow — slettix-analytics
#
# Forutsetninger:
#   Opprett/oppdater DAG ConfigMap etter endringer:
#     kubectl create configmap airflow-dags --namespace slettix-analytics \
#       --from-file=airflow/dags/ --dry-run=client -o yaml | kubectl apply -f -
#
# Installer / oppgrader:
#   helm repo add apache-airflow https://airflow.apache.org
#   helm repo update
#   helm upgrade --install airflow apache-airflow/airflow \
#     --namespace slettix-analytics \
#     --values k8s/helm/airflow/values.yaml \
#     --version 1.14.0 \
#     --timeout 8m

# ── Image (egendefinert, bygget med build-airflow-image.sh) ──────────────────
images:
  airflow:
    repository: slettix-analytics/airflow
    tag: "2.9.2"
    pullPolicy: IfNotPresent

# ── Executor: KubernetesExecutor — hver task kjører i sin egen pod ───────────
executor: KubernetesExecutor

config:
  core:
    load_examples: "False"
    dagbag_import_timeout: "120"   # kubernetes_asyncio-import kan ta >30s i kalde pods
  kubernetes_executor:
    namespace: slettix-analytics
    worker_container_repository: slettix-analytics/airflow
    worker_container_tag: "2.9.2"
    delete_worker_pods: "True"
    delete_worker_pods_on_failure: "False"

# ── Database (ekstern PostgreSQL — se k8s/apps/airflow/postgres.yaml) ─────────
postgresql:
  enabled: false

data:
  metadataConnection:
    user: airflow
    pass: airflow
    protocol: postgresql
    host: airflow-postgres
    port: 5432
    db: airflow
    sslmode: disable

# ── DAGs: ConfigMap → emptyDir via init-container ─────────────────────────────
# Init-container kopierer alle filer fra airflow-dags ConfigMap (mounted på
# /tmp/dags-cm/) til en delt emptyDir mounted på /opt/airflow/dags/.
# Dette bryter ConfigMap-symlinkene som forårsaker «Detected recursive loop»
# i Airflow sin DAG-scanner, OG gjør at nye DAGs lagt til ConfigMap dukker
# opp uten å måtte deklarere subPath-mount per fil i denne values-filen.
# Pipeline-builder i dataportalen kan dermed publisere DAGs automatisk.
dags:
  persistence:
    enabled: false
  gitSync:
    enabled: false

# ── Fernet- og webserver-nøkler fra K8s Secret ───────────────────────────────
fernetKey: ""
webserverSecretKey: ""

# ── Miljøvariabler fra K8s Secret slettix-credentials ────────────────────────
extraEnvVars:
  - name: AIRFLOW__CORE__FERNET_KEY
    valueFrom:
      secretKeyRef:
        name: slettix-credentials
        key: airflow-fernet-key
  - name: AIRFLOW__WEBSERVER__SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: slettix-credentials
        key: airflow-secret-key
  - name: MINIO_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: slettix-credentials
        key: minio-root-user
  - name: MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: slettix-credentials
        key: minio-root-password
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: "kafka-bootstrap.customermaster.svc.cluster.local:9092"
  - name: PORTAL_URL
    value: "http://dataportal.slettix-analytics.svc.cluster.local:8090"
  - name: PORTAL_API_KEY
    valueFrom:
      secretKeyRef:
        name: slettix-credentials
        key: portal-api-key
  - name: MINIO_ENDPOINT
    value: "http://minio.slettix-analytics.svc.cluster.local:9000"
  - name: AIRFLOW__API__AUTH_BACKENDS
    value: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"

# ── Airflow-koblinger ─────────────────────────────────────────────────────────
connections:
  - id: spark_default
    type: spark
    host: "k8s://https://kubernetes.default.svc"
    port: 443
  - id: kubernetes_default
    type: kubernetes
    extra: '{"in_cluster": true}'

# ── Admin-bruker ──────────────────────────────────────────────────────────────
defaultUser:
  enabled: true
  role: Admin
  username: admin
  email: admin@slettix.local
  firstName: Admin
  lastName: User
  password: admin

# ── Webserver ─────────────────────────────────────────────────────────────────
webserver:
  service:
    type: LoadBalancer
    ports:
      - name: airflow-ui
        port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 20
  readinessProbe:
    initialDelaySeconds: 30
    periodSeconds: 10
  extraVolumes:
    - name: dags-cm
      configMap:
        name: airflow-dags
    - name: dags
      emptyDir: {}
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
  extraInitContainers:
    - name: dag-copier
      image: busybox:1.36
      command: ["sh", "-c", "cp -L /tmp/dags-cm/*.py /opt/airflow/dags/ 2>/dev/null; ls /opt/airflow/dags"]
      volumeMounts:
        - name: dags-cm
          mountPath: /tmp/dags-cm
        - name: dags
          mountPath: /opt/airflow/dags


# ── Scheduler ─────────────────────────────────────────────────────────────────
scheduler:
  resources:
    requests:
      cpu: 200m
      memory: 768Mi
    limits:
      cpu: 500m
      memory: 1.5Gi
  extraVolumes:
    - name: dags-cm
      configMap:
        name: airflow-dags
    - name: dags
      emptyDir: {}
    - name: jobs-cm
      configMap:
        name: airflow-jobs
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
    - name: jobs-cm
      mountPath: /opt/airflow/jobs
      readOnly: true
  extraInitContainers:
    - name: dag-copier
      image: busybox:1.36
      command: ["sh", "-c", "cp -L /tmp/dags-cm/*.py /opt/airflow/dags/ 2>/dev/null; ls /opt/airflow/dags"]
      volumeMounts:
        - name: dags-cm
          mountPath: /tmp/dags-cm
        - name: dags
          mountPath: /opt/airflow/dags

# ── KubernetesExecutor worker pods ───────────────────────────────────────────
workers:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  extraVolumes:
    - name: dags-cm
      configMap:
        name: airflow-dags
    - name: dags
      emptyDir: {}
    - name: jobs-cm
      configMap:
        name: airflow-jobs
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
    - name: jobs-cm
      mountPath: /opt/airflow/jobs
      readOnly: true
  extraInitContainers:
    - name: dag-copier
      image: busybox:1.36
      command: ["sh", "-c", "cp -L /tmp/dags-cm/*.py /opt/airflow/dags/ 2>/dev/null; ls /opt/airflow/dags"]
      volumeMounts:
        - name: dags-cm
          mountPath: /tmp/dags-cm
        - name: dags
          mountPath: /opt/airflow/dags

# ── Triggerer ─────────────────────────────────────────────────────────────────
triggerer:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi
  extraVolumes:
    - name: dags-cm
      configMap:
        name: airflow-dags
    - name: dags
      emptyDir: {}
  extraVolumeMounts:
    - name: dags
      mountPath: /opt/airflow/dags
  extraInitContainers:
    - name: dag-copier
      image: busybox:1.36
      command: ["sh", "-c", "cp -L /tmp/dags-cm/*.py /opt/airflow/dags/ 2>/dev/null; ls /opt/airflow/dags"]
      volumeMounts:
        - name: dags-cm
          mountPath: /tmp/dags-cm
        - name: dags
          mountPath: /opt/airflow/dags


# ── Labels ────────────────────────────────────────────────────────────────────
labels:
  app.kubernetes.io/part-of: slettix-analytics
