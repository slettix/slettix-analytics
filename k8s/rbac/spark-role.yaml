# Tillatelser Spark-driveren trenger for å administrere executor-pods og tjenester.
# Scopet til slettix-analytics-namespacet — ikke ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark
  namespace: slettix-analytics
  labels:
    app.kubernetes.io/part-of: slettix-analytics
    app.kubernetes.io/component: spark
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "deletecollection"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete", "patch", "deletecollection"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
