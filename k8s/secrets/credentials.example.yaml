# Eksempel-struktur for K8s Secret — IKKE committ filen med ekte verdier.
# Generer det faktiske secretet med: scripts/k8s-secrets-create.sh
#
# Alle verdier er base64-encodet i ekte Secrets. Dette eksempelet bruker
# stringData slik at klartekst-nøklene er lesbare som referanse.
apiVersion: v1
kind: Secret
metadata:
  name: slettix-credentials
  namespace: slettix-analytics
  labels:
    app.kubernetes.io/part-of: slettix-analytics
type: Opaque
stringData:
  # MinIO
  minio-root-user:     "CHANGE_ME"
  minio-root-password: "CHANGE_ME"

  # Airflow — generer Fernet-nøkkel med:
  # python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  airflow-fernet-key:  "CHANGE_ME"
  airflow-secret-key:  "CHANGE_ME"

  # Dataportal
  portal-api-key:      "CHANGE_ME"

  # Anthropic (valgfri — brukes av AI-funksjoner i portalen)
  anthropic-api-key:   ""
