# SparkApplication — Folkeregister person-IDP (streaming)
#
# Leser person-hendelser fra Kafka og lander dem som Delta-tabell i Bronze.
# Jobben kjører kontinuerlig (Structured Streaming) og restartes automatisk
# av Spark Operator ved feil.
#
# Forhåndskrav:
#   1. Spark Operator installert (k8s-up.sh spark-operator)
#   2. slettix-credentials Secret finnes (k8s-secrets-create.sh)
#   3. Bronze-bucket opprettet i MinIO
#
# Deploy:
#   kubectl apply -f k8s/spark/folkeregister_person_idp.yaml
#
# Sjekk status:
#   kubectl get sparkapplication folkeregister-person-idp -n slettix-analytics -w
#
# Stopp:
#   kubectl delete sparkapplication folkeregister-person-idp -n slettix-analytics

apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: folkeregister-person-idp
  namespace: slettix-analytics
  labels:
    app: folkeregister-person-idp
    app.kubernetes.io/part-of: slettix-analytics
    app.kubernetes.io/component: idp-streaming
spec:
  type: Python
  mode: cluster
  image: slettix-analytics/spark:3.5.8
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/spark/jobs/folkeregister_person_idp.py"
  arguments:
    - "--starting-offsets"
    - "earliest"
  sparkVersion: "3.5.8"

  # Streaming-jobb: restart alltid ved feil
  restartPolicy:
    type: Always
    onFailureRetries: 10
    onFailureRetryInterval: 30
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20

  sparkConf:
    "spark.sql.extensions":                       "io.delta.sql.DeltaSparkSessionExtension"
    "spark.sql.catalog.spark_catalog":            "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    "spark.hadoop.fs.s3a.endpoint":               "http://minio.slettix-analytics.svc.cluster.local:9000"
    "spark.hadoop.fs.s3a.path.style.access":      "true"
    "spark.hadoop.fs.s3a.impl":                   "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.connection.ssl.enabled": "false"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.DefaultAWSCredentialsProviderChain"
    "spark.hadoop.fs.s3a.committer.name":         "directory"
    "spark.sql.shuffle.partitions":               "4"
    # Kafka-JARs er bakt inn i Docker-imaget (se docker/spark/Dockerfile)

  driver:
    cores: 1
    memory: "512m"
    memoryOverhead: "128m"
    serviceAccount: spark
    env:
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "kafka.customermaster.svc.cluster.local:9092"
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: slettix-credentials
            key: minio-root-user
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: slettix-credentials
            key: minio-root-password

  executor:
    instances: 1
    cores: 1
    memory: "512m"
    memoryOverhead: "128m"
    env:
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "kafka.customermaster.svc.cluster.local:9092"
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: slettix-credentials
            key: minio-root-user
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: slettix-credentials
            key: minio-root-password
